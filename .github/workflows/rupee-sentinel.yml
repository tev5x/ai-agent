name: Rupee Sentinel AI

on:
  schedule:
    # 9:30 AM IST = 4:00 AM UTC
    - cron: '0 4 * * *'
    # 10:30 AM IST = 5:00 AM UTC
    - cron: '0 5 * * *'
    # 11:30 AM IST = 6:00 AM UTC
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      force_alert:
        description: 'Send a test alert regardless of current USD/INR rate'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  rupee-sentinel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Rupee Sentinel AI
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_ALERT: ${{ github.event.inputs.force_alert || 'false' }}
        run: python rupee_sentinel.py

      - name: Commit alert state if changed
        run: |
          git config user.name "rupee-sentinel-ai"
          git config user.email "rupee-sentinel-ai@users.noreply.github.com"

          git add state/last_alert_date.txt || true

          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "state: mark daily alert sent"
            git push
          fi
